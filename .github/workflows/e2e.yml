name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:   # allow manual trigger

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      # MySQL database for the backend
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tms
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java + Maven (backend) ─────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build backend (skip unit tests for speed)
        working-directory: tms-backend
        run: mvn package -DskipTests -q

      - name: Start Spring Boot backend
        working-directory: tms-backend
        env:
          SPRING_PROFILES_ACTIVE: local
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/tms?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          SPRING_JPA_HIBERNATE_DDL_AUTO: update
          # Disable mail for CI (no SMTP available)
          SPRING_MAIL_HOST: localhost
          SPRING_MAIL_PORT: 1025
          SPRING_MAIL_USERNAME: test@test.com
          SPRING_MAIL_PASSWORD: testpass
        run: |
          java -jar target/*.jar &
          echo "Backend PID: $!"

      - name: Wait for backend to be ready
        run: |
          echo "Waiting for Spring Boot..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "✅ Backend is ready"
              break
            fi
            echo "  attempt $i/30..."
            sleep 3
          done

      # ── Node.js + Frontend ─────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tms-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: tms-frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tms-frontend
        run: npx playwright install --with-deps chromium

      # ── E2E Tests ──────────────────────────────────────────────────────────
      - name: Run E2E tests
        working-directory: tms-frontend
        env:
          CI: true
          PLAYWRIGHT_START_SERVER: true
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          PLAYWRIGHT_API_URL: http://localhost:8080/api/v1
          E2E_ADMIN_EMAIL: admin@tms.com
          E2E_ADMIN_PASSWORD: Admin@123
          VITE_API_BASE_URL: http://localhost:8080/api/v1
        run: npm run e2e:ci

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tms-frontend/playwright-report/
          retention-days: 30

      - name: Upload test results (traces, screenshots, videos)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tms-frontend/test-results/
          retention-days: 7
