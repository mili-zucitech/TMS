spring:
  application:
    name: tms-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    repair-on-migrate: true

  # Mail Configuration
  # MAIL_USERNAME and MAIL_PASSWORD are REQUIRED — the app will refuse to start if either is missing or empty.
  # For Gmail: MAIL_PASSWORD must be a 16-character App Password (Google Account → Security → App Passwords).
  # NEVER hardcode credentials here; always supply them via environment variables or a secrets manager.
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}           # Required — no default; do not add a fallback
    password: ${SPRING_MAIL_PASSWORD}           # Required — no default; App Password for Gmail
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          # Connection / read / write timeouts (ms) — prevents silent hangs when SMTP is unreachable
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: ${PORT:8080}

# JWT Configuration
# WARNING: Replace jwt.secret with a securely generated Base64-encoded key before deploying to production.
# Generate with: openssl rand -base64 64
jwt:
  secret: ${JWT_SECRET:dG1zLWp3dC1zZWNyZXQta2V5LXZlcnktc2VjdXJlLW1pbi0zMi1jaGFycw==}
  expiration: 86400000  # 24 hours in milliseconds

# CORS Configuration
# cors.allowed-origins is populated from the FRONTEND_URL environment variable.
# Falls back to http://localhost:5173 when FRONTEND_URL is not set (local dev).
# Do NOT use a wildcard "*" here — allowCredentials=true requires explicit origins.
# For multiple origins add additional list items using separate env vars, e.g.:
#   - ${STAGING_URL:https://staging.example.com}
cors:
  allowed-origins:
    - ${FRONTEND_URL:http://localhost:5173}

# Async thread pool
async:
  core-pool-size: 5
  max-pool-size: 20
  queue-capacity: 500

logging:
  level:
    com.company.tms: INFO
    org.springframework.security: WARN
    # ---- Mail debugging — reveals SMTP handshake details without exposing passwords ----
    org.springframework.mail: DEBUG
    com.sun.mail: DEBUG

