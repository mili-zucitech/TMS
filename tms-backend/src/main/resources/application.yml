spring:
  application:
    name: tms-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    repair-on-migrate: true

  # Mail Configuration
  # Override these values via environment variables or a profile-specific application-{profile}.yml
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:milisrivastava.zucitech@gmail.com}
    password: ${MAIL_PASSWORD:gffjrpybyuuqutpe}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${PORT:8080}

# JWT Configuration
# WARNING: Replace jwt.secret with a securely generated Base64-encoded key before deploying to production.
# Generate with: openssl rand -base64 64
jwt:
  secret: ${JWT_SECRET:dG1zLWp3dC1zZWNyZXQta2V5LXZlcnktc2VjdXJlLW1pbi0zMi1jaGFycw==}
  expiration: 86400000  # 24 hours in milliseconds

# CORS Configuration
# cors.allowed-origins is populated from the FRONTEND_URL environment variable.
# Falls back to http://localhost:5173 when FRONTEND_URL is not set (local dev).
# Do NOT use a wildcard "*" here — allowCredentials=true requires explicit origins.
# For multiple origins add additional list items using separate env vars, e.g.:
#   - ${STAGING_URL:https://staging.example.com}
cors:
  allowed-origins:
    - ${FRONTEND_URL:http://localhost:5173}

# Async thread pool
async:
  core-pool-size: 5
  max-pool-size: 20
  queue-capacity: 500

logging:
  level:
    com.company.tms: INFO
    org.springframework.security: WARN

